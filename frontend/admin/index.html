<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点数交易系统 - 管理后台</title>
<link rel="stylesheet" href="/shared/style.css">
</head>
<body>
<div id="app">
  <!-- 登录页面 -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <h2>🔐 管理员登录</h2>
      <form id="login-form">
        <div class="form-group"><label>用户名</label><input type="text" id="login-username" required autocomplete="username"></div>
        <div class="form-group"><label>密码</label><input type="password" id="login-password" required autocomplete="current-password"></div>
        <button type="submit" class="btn btn-primary w-full">登录</button>
      </form>
      <p id="login-error" class="text-sm" style="color:var(--danger);margin-top:12px;"></p>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="main-page" class="hidden">
    <header class="header">
      <div class="app-container header-inner">
        <h1>⚡ 管理后台</h1>
        <div class="user-info">
          <span id="admin-name"></span>
          <button class="btn btn-outline btn-sm" onclick="location.reload()">🔄 刷新</button>
          <button class="btn btn-outline btn-sm" onclick="logout()">退出</button>
        </div>
      </div>
    </header>

    <div class="app-container" style="padding-top:20px;">
      <!-- 统计仪表盘 -->
      <div class="stats-grid" id="dashboard-stats"></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="users">👥 用户管理</button>
        <button class="tab-btn" data-tab="tasks">📋 任务管理</button>
        <button class="tab-btn" data-tab="submissions">📝 任务审核</button>
        <button class="tab-btn" data-tab="shop">🛒 商品管理</button>
        <button class="tab-btn" data-tab="orders">📦 兑换审核</button>
        <button class="tab-btn" data-tab="lottery">🎰 抽奖管理</button>
        <button class="tab-btn" data-tab="loans">💰 贷款管理</button>
        <button class="tab-btn" data-tab="task-groups">🎲 随机任务组</button>
        <button class="tab-btn" data-tab="settings">⚙️ 系统设置</button>
        <button class="tab-btn" data-tab="logs">📜 操作日志</button>
      </div>

      <!-- Tab 内容区 -->
      <div id="tab-content"></div>
    </div>
  </div>

  <!-- Modal 容器 -->
  <div id="modal-container"></div>

  <!-- 图片查看器 -->
  <div id="img-viewer" class="hidden"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/shared/api.js"></script>
<script>
// ========== 全局状态 ==========
let currentTab = 'users';
let filterUserId = localStorage.getItem('filterUserId') || '';
let filterUserName = localStorage.getItem('filterUserName') || '';

function saveUserFilter(uid, uname) {
  filterUserId = uid; filterUserName = uname;
  localStorage.setItem('filterUserId', uid);
  localStorage.setItem('filterUserName', uname);
}

function userFilterHtml() {
  return `<div class="user-filter-bar">
    <span class="text-sm text-muted user-filter-label">筛选用户:</span>
    <input type="text" id="uf-input" placeholder="输入用户名搜索…" value="${esc(filterUserName)}"
      class="user-filter-input"
      onkeyup="if(event.key==='Enter')searchUserFilter()">
    <button class="btn btn-sm btn-primary" onclick="searchUserFilter()">查询</button>
    ${filterUserId ? `<button class="btn btn-sm btn-outline" onclick="saveUserFilter('','');refreshCurrentTab()">✕ 清除</button>` : ''}
  </div>`;
}

async function searchUserFilter() {
  const q = document.getElementById('uf-input').value.trim();
  if (!q) { saveUserFilter('',''); refreshCurrentTab(); return; }
  const d = await API.get(`/auth/users?search=${encodeURIComponent(q)}`).catch(()=>({users:[]}));
  if (!d.users?.length) { toast('未找到用户','error'); return; }
  if (d.users.length === 1) {
    const u = d.users[0];
    saveUserFilter(u.id, u.display_name || u.username);
    refreshCurrentTab();
    return;
  }
  let html = '<div style="max-height:200px;overflow-y:auto;">';
  for (const u of d.users) {
    html += `<div style="padding:8px;cursor:pointer;border-bottom:1px solid var(--border);" onclick="saveUserFilter('${u.id}','${esc(u.display_name||u.username)}');closeModal();refreshCurrentTab()">${esc(u.display_name||u.username)} <span class="text-sm text-muted">@${esc(u.username)}</span></div>`;
  }
  html += '</div>';
  showModal('选择用户', html);
}

function refreshCurrentTab() {
  const loaders = {
    submissions: loadSubmissions, orders: loadOrders, 'bp-redeem': loadBpRedemptions,
  };
  if (loaders[currentTab]) loaders[currentTab]();
}

function userFilterParam() {
  return filterUserId ? `&user_id=${encodeURIComponent(filterUserId)}` : '';
}

// ========== Toast ==========
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ========== 登录 ==========
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const data = await API.post('/auth/login', {
      username: document.getElementById('login-username').value,
      password: document.getElementById('login-password').value,
    });
    if (data.user.role !== 'admin') throw new Error('非管理员账号');
    API.setToken(data.token); API.user = data.user;
    localStorage.setItem('login_mode', 'admin');
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main-page').classList.remove('hidden');
    document.getElementById('admin-name').textContent = data.user.display_name || data.user.username;
    initAdmin();
  } catch (err) {
    document.getElementById('login-error').textContent = err.message;
  }
});

function logout() { API.setToken(''); API.user = null; localStorage.removeItem('login_mode'); sessionStorage.removeItem('admin_me'); location.href = '/'; }

// ========== 初始化 ==========
async function initAdmin() {
  if (!API.isLoggedIn) return;
  const hashTab = location.hash.replace('#', '');
  const validTabs = ['users','tasks','submissions','shop','orders','lottery','bp-redeem','task-groups','loans','settings','logs'];
  switchTab(validTabs.includes(hashTab) ? hashTab : 'users');
  // 异步加载仪表盘
  loadDashboard();
}

async function bootstrapAuth() {
  if (!API.isLoggedIn) return;
  // 快速缓存恢复
  const cached = sessionStorage.getItem('admin_me');
  if (cached) {
    try {
      const me = JSON.parse(cached);
      const now = Date.now();
      if (now - (me._ts || 0) < 30000) {
        API.user = { id: me.id, username: me.username, role: me.role, display_name: me.display_name };
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('main-page').classList.remove('hidden');
        document.getElementById('admin-name').textContent = me.display_name || me.username;
        initAdmin();
        return;
      }
    } catch {}
  }
  try {
    const me = await API.get('/auth/me');
    const mode = localStorage.getItem('login_mode') || '';
    if (me.role !== 'admin') { location.href = '/user/'; return; }
    if (mode === 'user') { location.href = '/user/'; return; }
    me._ts = Date.now();
    sessionStorage.setItem('admin_me', JSON.stringify(me));
    API.user = { id: me.id, username: me.username, role: me.role, display_name: me.display_name };
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main-page').classList.remove('hidden');
    document.getElementById('admin-name').textContent = me.display_name || me.username;
    initAdmin();
  } catch {
    API.setToken('');
  }
}

bootstrapAuth();

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  currentTab = tab;
  location.hash = '#' + tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
  if (activeBtn) activeBtn.classList.add('active');
  const loaders = {
    users: loadUsers, tasks: loadTasks, submissions: loadSubmissions,
    shop: loadShopItems, orders: loadOrders, lottery: loadLottery, 'bp-redeem': loadBpRedemptions,
    'task-groups': loadTaskGroups, loans: loadLoans, settings: loadSettings, logs: loadLogs,
  };
  if (loaders[tab]) loaders[tab]();
}

async function loadDashboard() {
  try { const [d, ls] = await Promise.all([
    API.get('/admin/dashboard'),
    API.get('/lottery/admin/stats').catch(() => ({})),
  ]);
    document.getElementById('dashboard-stats').innerHTML = `
      <div class="stat-card"><div class="num">${d.total_users}</div><div class="label">用户总数</div></div>
      <div class="stat-card"><div class="num">${d.pending_submissions}</div><div class="label">待审核任务</div></div>
      <div class="stat-card"><div class="num">${d.pending_orders}</div><div class="label">待审核兑换</div></div>
      <div class="stat-card"><div class="num">${d.active_loans}</div><div class="label">活跃贷款</div></div>
      <div class="stat-card"><div class="num">${ls.total_draws||0}</div><div class="label">总抽卡次数</div></div>
      <div class="stat-card"><div class="num">${ls.pending_redemptions||0}</div><div class="label">待审背包兑换</div></div>
      <div class="stat-card"><div class="num">${d.total_tasks}</div><div class="label">活跃任务</div></div>
      <div class="stat-card"><div class="num">${d.total_items}</div><div class="label">可兑换商品</div></div>
    `;
  } catch {}
}

// ========== 用户管理 ==========
async function loadUsers(page = 1) {
  try { const d = await API.get(`/auth/users?page=${page}`);
    let html = `<div class="card"><div class="flex-between mb-2">
      <h3>用户列表 (共 ${d.total} 人)</h3>
      <button class="btn btn-primary btn-sm" onclick="showCreateUserModal()">+ 创建用户</button></div>
      <div class="table-wrap"><table><thead><tr>
        <th>用户名</th><th>显示名</th><th>角色</th><th>创建时间</th><th>操作</th>
      </tr></thead><tbody>`;
    for (const u of d.users) {
      html += `<tr>
        <td>${esc(u.username)}</td><td>${esc(u.display_name)}</td>
        <td><span class="tag tag-${u.role === 'admin' ? 'approved' : 'active'}">${u.role}</span></td>
        <td>${fmtDate(u.created_at)}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="showUserBalance('${u.id}','${esc(u.username)}')">点数</button>
          <button class="btn btn-outline btn-sm" onclick="showAdjustPoints('${u.id}','${esc(u.username)}')">调整</button>
          <button class="btn btn-outline btn-sm" onclick="showUserLedger('${u.id}','${esc(u.username)}')">流水</button>
          <button class="btn btn-outline btn-sm" onclick="showEditUser('${u.id}','${esc(u.username)}','${esc(u.display_name)}','${u.role}')">编辑</button>
          ${u.role !== 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${esc(u.username)}')">删除</button>` : ''}
        </td></tr>`;
    }
    html += `</tbody></table></div>${pager(page, d.total, 20, 'loadUsers')}</div>`;
    setContent(html);
  } catch(err) { setContent(`<div class="card"><p style="color:var(--danger)">加载失败: ${err.message}</p></div>`); }
}

function showCreateUserModal() {
  showModal('创建用户', `
    <div class="form-group"><label>用户名</label><input type="text" id="new-username"></div>
    <div class="form-group"><label>密码</label><input type="password" id="new-password"></div>
    <div class="form-group"><label>显示名称</label><input type="text" id="new-display"></div>
    <button class="btn btn-primary w-full" onclick="createUser()">创建</button>
  `);
}

async function createUser() {
  try {
    await API.post('/auth/create-user', {
      username: document.getElementById('new-username').value,
      password: document.getElementById('new-password').value,
      display_name: document.getElementById('new-display').value,
    });
    closeModal(); toast('用户创建成功', 'success'); loadUsers();
  } catch(err) { toast(err.message, 'error'); }
}

function showEditUser(uid, uname, dname, role) {
  showModal(`编辑用户: ${uname}`, `
    <div class="form-group"><label>用户名</label><input type="text" id="eu-username" value="${esc(uname)}"></div>
    <div class="form-group"><label>显示名称</label><input type="text" id="eu-display" value="${esc(dname)}"></div>
    <div class="form-group"><label>角色</label><select id="eu-role">
      <option value="user" ${role==='user'?'selected':''}>普通用户</option>
      <option value="admin" ${role==='admin'?'selected':''}>管理员</option>
    </select></div>
    <div class="form-group"><label>新密码 (留空不修改)</label><input type="password" id="eu-password" placeholder="留空则不修改密码"></div>
    <button class="btn btn-primary w-full" onclick="doEditUser('${uid}')">保存修改</button>
  `);
}

async function doEditUser(uid) {
  try {
    const body = {
      username: document.getElementById('eu-username').value,
      display_name: document.getElementById('eu-display').value,
      role: document.getElementById('eu-role').value,
    };
    const pwd = document.getElementById('eu-password').value;
    if (pwd) body.password = pwd;
    await API.put(`/auth/users/${uid}`, body);
    closeModal(); toast('用户已更新', 'success'); loadUsers();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteUser(uid, uname) {
  if (!confirm(`确认删除用户「${uname}」及其所有数据?\n此操作不可撤销!`)) return;
  try {
    await API.del(`/auth/users/${uid}`);
    toast(`用户「${uname}」已删除`, 'success'); loadUsers();
  } catch(e) { toast(e.message, 'error'); }
}

async function showUserBalance(uid, uname) {
  try { const d = await API.get(`/admin/points/balance/${uid}`);
    showModal(`${uname} 的余额`, `<p style="font-size:2rem;font-weight:800;text-align:center;">${d.realtime_balance} 点</p>`);
  } catch(e) { toast(e.message, 'error'); }
}

function showAdjustPoints(uid, uname) {
  showModal(`调整 ${uname} 的点数`, `
    <div class="form-group"><label>金额 (正数=增加, 负数=扣减)</label><input type="number" id="adj-amount"></div>
    <div class="form-group"><label>原因</label><input type="text" id="adj-reason"></div>
    <div class="form-group"><label>有效期(秒, 0=永久)</label><input type="number" id="adj-expiry" value="0"></div>
    <button class="btn btn-primary w-full" onclick="doAdjust('${uid}')">确认调整</button>
  `);
}

async function doAdjust(uid) {
  try {
    const amount = parseInt(document.getElementById('adj-amount').value);
    const expiry = parseInt(document.getElementById('adj-expiry').value) || null;
    await API.post('/admin/points/adjust', {
      user_id: uid, amount,
      description: document.getElementById('adj-reason').value,
      expiry_seconds: expiry,
    });
    closeModal(); toast('点数调整成功', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function showUserLedger(uid, uname) {
  try {
    const [d, draws] = await Promise.all([
      API.get(`/admin/points/ledger/${uid}`),
      API.get(`/lottery/admin/draws/${uid}?page=1`).catch(()=>({draws:[],total:0})),
    ]);
    let html = `<h3>${uname} 点数流水 (实时余额: <span style="color:${d.realtime_balance<0?'var(--danger)':'var(--primary)'}">${d.realtime_balance}</span> 点)</h3>
    <p class="text-sm text-muted mb-2">共 ${d.total} 条点数记录</p>
    <div class="table-wrap"><table><thead><tr>
      <th>类型</th><th>金额</th><th>描述</th><th>过期时间</th><th>状态</th><th>时间</th></tr></thead><tbody>`;
    const now = new Date();
    for (const e of d.entries) {
      const expired = e.expires_at && new Date(e.expires_at) < now;
      const expiring = e.expires_at && !expired && (new Date(e.expires_at) - now) < 7*86400000;
      html += `<tr style="${expired?'opacity:0.5':''}">
        <td><span class="tag">${e.type}</span></td>
        <td style="color:${e.amount>0?'var(--success)':'var(--danger)'}">${e.amount>0?'+':''}${e.amount}</td>
        <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;">${esc(e.description)}</td>
        <td>${e.expires_at ? fmtDate(e.expires_at) : '永不过期'}</td>
        <td>${e.amount <= 0 ? '<span class="tag tag-rejected">已消耗</span>' : expired ? '<span class="tag tag-rejected">已过期</span>' : expiring ? '<span class="tag tag-pending">即将过期</span>' : '<span class="tag tag-active">有效</span>'}</td>
        <td>${fmtDate(e.created_at)}</td></tr>`;
    }
    html += '</tbody></table></div>';

    if (draws.draws?.length) {
      html += `<h4 class="mt-2">🎰 抽卡记录 (${draws.total||draws.draws.length}次)</h4>
      <div class="table-wrap"><table><thead><tr><th>物品</th><th>稀有度</th><th>消耗</th><th>保底</th><th>时间</th></tr></thead><tbody>`;
      for (const r of draws.draws.slice(0,30)) {
        html += `<tr><td>${r.item_icon||''} ${esc(r.item_name)}</td>
          <td><span class="tag tag-${r.rarity==='legendary'?'gold':r.rarity==='epic'?'approved':'info'}">${r.rarity}</span></td>
          <td style="color:var(--danger)">-${r.points_spent}</td>
          <td>${r.is_pity?'<span class="tag tag-gold">保底</span>':'第'+r.draw_index+'抽'}</td>
          <td>${fmtDate(r.created_at)}</td></tr>`;
      }
      html += '</tbody></table></div>';
    }

    showModal(`${uname} 完整记录`, html);
  } catch(e) { toast(e.message, 'error'); }
}

// ========== 任务管理 ==========
async function loadTasks() {
  try { const d = await API.get('/tasks/admin');
    let html = `<div class="card"><div class="flex-between mb-2"><h3>任务列表</h3>
      <button class="btn btn-primary btn-sm" onclick="showTaskForm()">+ 创建任务</button></div>
      <div class="table-wrap"><table><thead><tr>
        <th>标题</th><th>点数范围</th><th>周期</th><th>提交类型</th><th>状态</th><th>操作</th></tr></thead><tbody>`;
    for (const t of d.tasks) {
      html += `<tr>
        <td><strong>${esc(t.title)}</strong><br><span class="text-sm text-muted">${esc(t.description)}</span></td>
        <td>${t.points_min} - ${t.points_max}</td>
        <td>${t.period_type} x${t.period_value}</td>
        <td>${t.submission_type}</td>
        <td><span class="tag tag-${t.is_active?'active':'rejected'}">${t.is_active?'启用':'禁用'}</span></td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="showTaskForm('${t.id}')">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">删除</button>
        </td></tr>`;
    }
    html += `</tbody></table></div></div>`;
    setContent(html);
  } catch(e) { setContent(`<div class="card"><p style="color:var(--danger)">${e.message}</p></div>`); }
}

async function showTaskForm(taskId) {
  let task = null;
  if (taskId) {
    const d = await API.get('/tasks/admin');
    task = d.tasks.find(t => t.id === taskId);
  }

  showModal(task ? '编辑任务' : '创建任务', `
    <div class="form-group"><label>标题</label><input type="text" id="tf-title" value="${esc(task?.title||'')}"></div>
    <div class="form-group"><label>描述</label><textarea id="tf-desc">${esc(task?.description||'')}</textarea></div>
    <div class="grid-2">
      <div class="form-group"><label>最低点数</label><input type="number" id="tf-min" value="${task?.points_min??0}"></div>
      <div class="form-group"><label>最高点数</label><input type="number" id="tf-max" value="${task?.points_max??0}"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>周期类型</label><select id="tf-period"><option value="daily" ${task?.period_type==='daily'?'selected':''}>每日</option><option value="weekly" ${task?.period_type==='weekly'?'selected':''}>每周</option><option value="monthly" ${task?.period_type==='monthly'?'selected':''}>每月</option></select></div>
      <div class="form-group"><label>每周期次数</label><input type="number" id="tf-pv" value="${task?.period_value??1}"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>提交类型</label><select id="tf-stype"><option value="both" ${task?.submission_type==='both'?'selected':''}>图片+文字</option><option value="image" ${task?.submission_type==='image'?'selected':''}>仅图片</option><option value="text" ${task?.submission_type==='text'?'selected':''}>仅文字</option></select></div>
      <div class="form-group"><label>点数有效期(秒, 0=使用默认)</label><input type="number" id="tf-expiry" value="${task?.expiry_seconds??''}"></div>
    </div>
    <div class="form-group"><label><input type="checkbox" id="tf-active" ${task?.is_active!==0?'checked':''}> 启用</label></div>
    <button class="btn btn-primary w-full" onclick="saveTask('${taskId||''}')">保存</button>
  `);
}

async function saveTask(id) {
  try {
    const body = {
      title: document.getElementById('tf-title').value,
      description: document.getElementById('tf-desc').value,
      points_min: parseInt(document.getElementById('tf-min').value),
      points_max: parseInt(document.getElementById('tf-max').value),
      period_type: document.getElementById('tf-period').value,
      period_value: parseInt(document.getElementById('tf-pv').value),
      submission_type: document.getElementById('tf-stype').value,
      is_active: document.getElementById('tf-active').checked ? 1 : 0,
      expiry_seconds: parseInt(document.getElementById('tf-expiry').value) || null,
    };
    if (id) body.id = id;
    await API.post('/tasks/admin', body);
    closeModal(); toast('任务保存成功', 'success'); loadTasks();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteTask(id) { if (!confirm('确定删除此任务?')) return;
  try { await API.del(`/tasks/admin/${id}`); toast('已删除', 'success'); loadTasks(); }

  try { const d = await API.get(`/tasks/admin/submissions?page=${page}&status=${subStatus}${userFilterParam()}`);
    let html = `<div class="card">${userFilterHtml()}<div class="flex-between mb-2"><h3>任务提交审核 (共 ${d.total})</h3>
      <select onchange="subStatus=this.value;loadSubmissions()" style="padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);">
        <option value="">全部</option><option value="pending" ${subStatus==='pending'?'selected':''}>待审核</option><option value="approved" ${subStatus==='approved'?'selected':''}>已通过</option><option value="rejected" ${subStatus==='rejected'?'selected':''}>已拒绝</option>
      </select></div>
    <div class="table-wrap"><table><thead><tr><th>用户</th><th>任务</th><th>内容</th><th>图片</th><th>周期</th><th>状态</th><th>操作</th></tr></thead><tbody>`;
    for (const s of d.submissions) {
      html += `<tr>
        <td>${esc(s.display_name||s.username)}</td><td class="td-task">${esc(s.task_title)}</td>
        <td class="td-content">${esc(s.content_text)}</td>
        <td>${s.image_url ? `<a href="#" onclick="viewImage('${s.image_url}');return false">查看</a>` : '-'}</td>
        <td>${s.period_label}</td>
        <td><span class="tag tag-${s.status}">${s.status==='pending'?'待审':s.status==='approved'?'通过':'拒绝'}</span></td>
        <td>${s.status==='pending' ? `
          <button class="btn btn-success btn-sm" onclick="reviewSubmission('${s.id}','approved','${s.task_id}')">通过</button>
          <button class="btn btn-danger btn-sm" onclick="reviewSubmission('${s.id}','rejected','${s.task_id}')">拒绝</button>` :
          `<span class="text-sm text-muted">${s.awarded_points?`+${s.awarded_points}点`:''}</span>`}</td></tr>`;
    }
    html += `</tbody></table></div>${pager(page, d.total, 20, 'loadSubmissions')}</div>`;
    setContent(html);
  } catch(e) { setContent(`<div class="card"><p style="color:var(--danger)">${e.message}</p></div>`); }
}

async function reviewSubmission(sid, status, taskId) {
  let points = 0;
  if (status === 'approved') {
    const [td, rtd] = await Promise.all([
      API.get('/tasks/admin'),
      API.get('/random-tasks/admin/tasks').catch(()=>({tasks:[]})),
    ]);
    const task = td.tasks.find(t => t.id === taskId) || (rtd.tasks||[]).find(t => t.id === taskId);
    const p = prompt(`给予点数 (任务范围: ${task?.points_min??0}-${task?.points_max??0}):`, task?.points_min??0);
    if (!p) return;
    points = parseInt(p);
    if (isNaN(points) || points < (task?.points_min??0) || points > (task?.points_max??0)) {
      toast('点数超出任务范围', 'error'); return;
    }
  }
  try {
    await API.post(`/tasks/admin/review/${sid}`, { status, awarded_points: points, remark: '' });
    toast(status === 'approved' ? '已通过' : '已拒绝', 'success'); loadSubmissions(subPage);
  } catch(e) { toast(e.message, 'error'); }
}

async function searchUserBackpack() {
  const q = document.getElementById('bp-user-search').value.trim();
  if (!q) return;
  const users = await API.get(`/auth/users?search=${encodeURIComponent(q)}`).catch(() => ({ users: [] }));

  const u = users.users[0];
  const bp = await API.get(`/lottery/admin/backpack/${u.id}`).catch(()=>({backpack:[]}));
  let h = `<strong>${esc(u.display_name||u.username)} 的背包</strong><div class="table-wrap"><table><thead><tr><th>物品</th><th>稀有度</th><th>数量</th><th>状态</th><th>操作</th></tr></thead><tbody>`;

      <td>${!i.is_redeemed ? `<button class="btn btn-danger btn-sm" onclick="adminRemoveBackpackItem('${i.id}','${u.id}')">移除</button>` : '-'}</td></tr>`;
  }
  h += '</tbody></table></div>';
  document.getElementById('bp-search-result').innerHTML = h;
}

// ========== 工具函数 ==========
function setContent(html) { document.getElementById('tab-content').innerHTML = html; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(d) { if (!d) return '-'; return new Date(d).toLocaleString('zh-CN'); }

// ========== 图片查看器 (支持双指缩放) ==========
let imgViewerScale = 1, imgViewerStartDist = 0, imgViewerStartScale = 1, imgViewerPanX = 0, imgViewerPanY = 0, imgViewerIsPanning = false, imgViewerPanStartX = 0, imgViewerPanStartY = 0;

function viewImage(url) {
  const v = document.getElementById('img-viewer');
  imgViewerScale = 1; imgViewerPanX = 0; imgViewerPanY = 0;
  v.innerHTML = `
    <div class="img-viewer-overlay" id="img-viewer-bg" onclick="if(event.target===this)closeImageViewer()">
      <button class="img-viewer-close" onclick="closeImageViewer()">✕</button>
      <div class="img-viewer-wrapper" id="img-viewer-wrap">
        <img src="${url}" id="img-viewer-img" draggable="false">
      </div>
      <div class="img-viewer-toolbar" id="img-viewer-bar">
        <button onclick="zoomImageViewer(0.3)">🔍 放大</button>
        <button onclick="zoomImageViewer(-0.3)">🔎 缩小</button>
        <button onclick="zoomImageViewer(0, true)">↺ 重置</button>
        <button onclick="downloadImage('${url}')">💾 下载</button>
      </div>
    </div>`;
  v.classList.remove('hidden');

  const wrap = document.getElementById('img-viewer-wrap');
  wrap.addEventListener('touchstart', onImgTouchStart, { passive: false });
  wrap.addEventListener('touchmove', onImgTouchMove, { passive: false });
  wrap.addEventListener('touchend', onImgTouchEnd);
}

function applyImgTransform() {
  const img = document.getElementById('img-viewer-img');
  if (img) img.style.transform = `translate(${imgViewerPanX}px,${imgViewerPanY}px) scale(${imgViewerScale})`;
}

function zoomImageViewer(delta, reset) {
  if (reset) { imgViewerScale = 1; imgViewerPanX = 0; imgViewerPanY = 0; }
  else imgViewerScale = Math.max(0.2, Math.min(5, imgViewerScale + delta));
  applyImgTransform();
}

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function onImgTouchStart(e) {
  if (e.touches.length === 2) {
    imgViewerIsPanning = false;
    imgViewerStartDist = getTouchDist(e.touches);
    imgViewerStartScale = imgViewerScale;
    e.preventDefault();
  } else if (e.touches.length === 1) {
    imgViewerIsPanning = true;
    imgViewerPanStartX = e.touches[0].clientX - imgViewerPanX;
    imgViewerPanStartY = e.touches[0].clientY - imgViewerPanY;
  }
}

function onImgTouchMove(e) {
  if (e.touches.length === 2) {
    imgViewerIsPanning = false;
    const dist = getTouchDist(e.touches);
    if (imgViewerStartDist > 0) {
      imgViewerScale = Math.max(0.2, Math.min(5, imgViewerStartScale * (dist / imgViewerStartDist)));
      applyImgTransform();
    }
    e.preventDefault();
  } else if (e.touches.length === 1 && imgViewerIsPanning) {
    imgViewerPanX = e.touches[0].clientX - imgViewerPanStartX;
    imgViewerPanY = e.touches[0].clientY - imgViewerPanStartY;
    applyImgTransform();
  }
}

function onImgTouchEnd(e) {
  if (e.touches.length === 0) {
    imgViewerIsPanning = false;
    imgViewerStartDist = 0;
  }
}

function closeImageViewer() {
  document.getElementById('img-viewer').classList.add('hidden');
  document.getElementById('img-viewer').innerHTML = '';
  imgViewerScale = 1; imgViewerPanX = 0; imgViewerPanY = 0;
}

async function downloadImage(url) {
  try {
    const r = await fetch(url);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = url.split('/').pop() || 'image';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(e) { window.open(url, '_blank'); }
}

function pager(page, total, ps, fn) {
  const tp = Math.ceil(total / ps);
  if (tp <= 1) return '';
  let h = '<div class="pagination">';
  for (let i = 1; i <= tp; i++) {
    h += `<button class="btn btn-outline btn-sm ${i===page?'btn-primary':''}" onclick="${fn}(${i})">${i}</button>`;
  }
  return h + '</div>';
}

function showModal(title, body) {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal"><div class="flex-between mb-2"><h3>${title}</h3><button class="btn btn-outline btn-sm" onclick="closeModal()">✕</button></div>${body}</div>
    </div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

        <div class="stats-grid">

    <div class="form-group"><label>描述</label><textarea id="li-desc">${esc(item?.description||'')}</textarea></div>
    <div class="grid-2">

    </div>

async function saveLotteryItem(id) {
  try {
    const rewardType = document.getElementById('li-rtype').value;
    const body = {
      name: document.getElementById('li-name').value,
      description: document.getElementById('li-desc').value,
      icon: document.getElementById('li-icon').value,
      rarity: document.getElementById('li-rarity').value,
      probability: parseFloat(document.getElementById('li-prob').value),
      sort_order: parseInt(document.getElementById('li-sort').value),
      reward_type: rewardType,
      points_amount: rewardType === 'points' ? parseInt(document.getElementById('li-pts').value) || 0 : 0,
      image_url: document.getElementById('li-image').value,
      is_active: document.getElementById('li-active').checked ? 1 : 0,
    };
    if (id) body.id = id;
    await API.post('/lottery/admin/items', body);
    closeModal(); toast('奖品保存成功', 'success'); loadLottery();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteLotteryItem(id) { if (!confirm('删除?')) return;
  try { await API.del(`/lottery/admin/items/${id}`); toast('已删除'); loadLottery(); }
  catch(e) { toast(e.message, 'error'); }
}

async function updateLotterySetting(key, val) {
  const body = {};
  if (key === 'cost') body.cost = parseInt(val);
  else if (key === 'pity_count') body.pity_count = parseInt(val);
  else if (key === 'pity_item_id') body.pity_item_id = val;
  try { await API.put('/lottery/admin/settings', body); toast('设置已更新', 'success'); }
  catch (e) { toast(e.message, 'error'); }
}

async function loadTaskGroups() {
  try {
    const [d, rt] = await Promise.all([
      API.get('/random-tasks/admin/groups'),
      API.get('/random-tasks/admin/tasks'),
    ]);
    const groups = d.groups || [];
    let html = `<div class="card"><div class="flex-between mb-2"><h3>随机任务组 (${groups.length}个) & 任务库</h3>
      <div class="flex gap-1">
        <button class="btn btn-primary btn-sm" onclick="showRandomTaskForm()">+ 添加随机任务</button>

      </div></div>
      <p class="text-sm text-muted mb-2">独立任务库 · 从下方任务中选择一组组成惊喜任务组</p>`;

    // 独立任务列表
    html += `<div class="card" style="background:var(--surface2);margin-bottom:12px;"><h4>📋 随机任务库 (${(rt.tasks||[]).length}个)</h4>
    <div class="table-wrap"><table><thead><tr><th>标题</th><th>点数</th><th>提交</th><th>状态</th><th>操作</th></tr></thead><tbody>`;
    for (const t of (rt.tasks||[])) {
      html += `<tr><td><strong>${esc(t.title)}</strong><br><span class="text-sm text-muted">${esc(t.description)}</span></td>
        <td>${t.points_min}-${t.points_max}</td><td>${t.submission_type}</td>
        <td><span class="tag tag-${t.is_active?'active':'rejected'}">${t.is_active?'启用':'禁用'}</span></td>
        <td><button class="btn btn-outline btn-sm" onclick="showRandomTaskForm('${t.id}')">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRandomTask('${t.id}')">删除</button></td></tr>`;
    }
    html += '</tbody></table></div></div>';

    // 任务组列表
    for (const g of groups) {
      html += `<div class="card" style="background:var(--surface2);">
        <div class="flex-between"><div><strong>${esc(g.name)}</strong> <span class="tag tag-info">${g.period_type==='daily'?'每日':g.period_type==='weekly'?'每周':'每月'}</span> ${g.is_active?'<span class=\"tag tag-active\">启用</span>':'<span class=\"tag tag-rejected\">禁用</span>'}</div>
        <div class="flex gap-1">
          <button class="btn btn-outline btn-sm" onclick="showTaskGroupForm('${g.id}')">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTaskGroup('${g.id}')">删除</button>
        </div></div>
        <div class="mt-1 text-sm text-muted">候选任务: ${(g.items||[]).map(i => `${esc(i.title)}(${i.points_min}-${i.points_max}点)`).join(', ') || '无'}</div>
      </div>`;
    }
    html += '</div>';
    setContent(html);
  } catch(e) { setContent(`<div class="card"><p style="color:var(--danger)">${e.message}</p></div>`); }
}

async function deleteRandomTask(id) { if (!confirm('删除?')) return;

async function showTaskGroupForm(gid) {
  let group = null;

    const d = await API.get('/random-tasks/admin/groups');

      <option value="monthly" ${group?.period_type==='monthly'?'selected':''}>每月</option>

async function saveTaskGroup(id) {
  try {
    const taskIds = [];
    document.querySelectorAll('[id^="tg-tid-"]').forEach(cb => { if (cb.checked) taskIds.push(cb.value); });
    if (taskIds.length === 0) { toast('请至少选一个候选任务', 'error'); return; }
    const body = {
      name: document.getElementById('tg-name').value,
      period_type: document.getElementById('tg-period').value,
      is_active: document.getElementById('tg-active').checked ? 1 : 0,
      task_ids: taskIds,
    };
    if (id) body.id = id;
    await API.post('/random-tasks/admin/groups', body);
    closeModal(); toast('任务组保存成功', 'success'); loadTaskGroups();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteTaskGroup(id) { if (!confirm('确定删除?')) return;
  try { await API.del(`/random-tasks/admin/groups/${id}`); toast('已删除', 'success'); loadTaskGroups(); }
  catch(e) { toast(e.message, 'error'); }
}
